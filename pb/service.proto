syntax = "proto3";

package service;

import "google/protobuf/struct.proto";

option go_package = "/service";

// Heartbeat request message - master sends to nodes
message HeartbeatRequest {
    map<string, bytes> commits = 1;    // 提交的CommitSlotItem列表
    map<string, bytes> justifieds = 2;
    map<string, bytes> finalizes = 3;  // 完成的CommitSlotItem列表
    map<string, int32> invalids = 4;   // 这个epoch中检测出的有问题的slot
    int32 epoch = 5;
    
    // New fields for epoch validation
    string epochRoot = 6;              // Epoch merkle root
    repeated NodeMerkleInfo nodeMerkleInfos = 7; // Merkle info for each node
}

// Merkle information sent to each node
message NodeMerkleInfo {
    int32 nodeId = 1;
    string nodeRoot = 2;               // Merkle root of slots for this node
    repeated TaskMerkleProof taskProofs = 3; // Task merkle proofs
    string epochMerkleProof = 4;       // Proof of epochRoot
}

// Task merkle proof information
message TaskMerkleProof {
    string taskSign = 1;
    string taskRoot = 2;
    string merkleProof = 3;            // JSON encoded merkle proof
}

// Heartbeat response - nodes send back to master
message HeartbeatResponse {
    int32 nodeId = 1;          // 节点id
    int32 cpuUsage = 2;
    int32 diskAvailable = 3;
    
    // New fields for epoch validation
    string epochSignature = 4;         // BLS signature of epochRoot
    bool epochValidated = 5;           // Whether node validated the epoch
    string validationError = 6;        // Error message if validation failed
}

message ScheduleRequest {
    string sign = 1;   // 任务标记
    int32 size = 2;    // 给该节点的任务数量
    string model = 3;  // 模型名称
}

message ScheduleResponse {
    bool accept = 1;   // 是否接受
}

message SlotCommitRequest {
    string slotHash = 1;
    int32 size = 2;
    bytes commitment = 3;      // 数据的完整性承诺
    bytes signature = 4;       // 需要节点对此签名
    repeated bytes votes = 5;  // 如果是ec或者多副本，需要其他节点的签名
    int32 store = 6;          // 存储方式,0=ec; 1=local; 2=replicas
}

message SlotCommitResponse {
    bool accept = 1;
}

service RappaMaster {
    rpc CommitSlot(SlotCommitRequest) returns (SlotCommitResponse);
}

service RappaSynthesizer {
    rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);
    rpc Schedule(ScheduleRequest) returns (ScheduleResponse);
}